name: Build Windows

on:
  push:
    tags:
      - 'v*'        # Se activa al crear un tag: v1.0.0, v1.2.3, etc.
  workflow_dispatch: # También permite ejecutarlo manualmente desde GitHub

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write build secrets
        shell: bash
        env:
          BUILD_SECRETS: ${{ secrets.BUILD_SECRETS }}
        run: echo "$BUILD_SECRETS" > src/main/license/buildSecrets.ts

      - name: Build app + generate icons
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: curo-windows-installer
          path: release/*.exe
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
